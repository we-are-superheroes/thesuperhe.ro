<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wireframes — User Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5f3ef; font-family: 'DM Sans', sans-serif; }

  /* Wireframe sketch style */
  .wf {
    font-family: 'Caveat', cursive;
    color: #2a2a2a;
  }
  .wf-box {
    border: 2px solid #2a2a2a;
    border-radius: 6px;
    background: #fff;
  }
  .wf-box-dashed {
    border: 2px dashed #999;
    border-radius: 6px;
    background: rgba(255,255,255,0.5);
  }
  .wf-fill {
    background: #e8e4dc;
    border: 2px solid #2a2a2a;
    border-radius: 6px;
  }
  .wf-accent {
    background: #F4A535;
    border: 2px solid #2a2a2a;
    border-radius: 6px;
    color: #2a2a2a;
    font-weight: 600;
  }
  .wf-primary {
    background: #1B3A6B;
    border: 2px solid #1B3A6B;
    border-radius: 6px;
    color: #fff;
    font-weight: 600;
  }
  .wf-line {
    height: 10px;
    background: #ccc;
    border-radius: 4px;
  }
  .wf-line-dark {
    height: 12px;
    background: #999;
    border-radius: 4px;
  }
  .wf-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: #d0ccc4;
    border: 2px solid #2a2a2a;
    flex-shrink: 0;
  }
  .wf-img {
    background: #d8d4cc;
    border: 2px solid #bbb;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #999;
    font-size: 14px;
  }
  .wf-tag {
    display: inline-block;
    padding: 3px 10px;
    border: 1.5px solid #999;
    border-radius: 999px;
    font-size: 15px;
    color: #666;
    font-family: 'Caveat', cursive;
  }
  .wf-note {
    font-family: 'Caveat', cursive;
    color: #F4A535;
    font-size: 16px;
    font-weight: 600;
  }
  .wf-label {
    font-family: 'Caveat', cursive;
    font-size: 14px;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .wf-progress {
    height: 8px;
    background: #e0ddd5;
    border-radius: 4px;
    overflow: hidden;
  }
  .wf-progress-fill {
    height: 100%;
    background: #1B3A6B;
    border-radius: 4px;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

/* ─── DESIGN CONTEXT ──────────────────────────────────
   The Superhero — User Dashboard wireframes.
   
   Platform: connects people with sustainability projects.
   Key entities: Projects, Steps (with needs_help), Skills, Contributions.
   
   User has answered:
   - Dashboard is the focus
   - Desktop, 4-5 variations
   - Filtering & search power
   - Steps are a section alongside other content
   - Join whole project first, then pick steps
   - Focus on information architecture variations
   
   Exploring different ways to organize:
   1. My contributions, active projects, suggested projects
   2. Step-level tasks vs project-level overview
   3. Feed vs panels vs kanban-like
   ─────────────────────────────────────────────────── */

const { DesignCanvas, DCArtboard, DCSection } = window;

// ─── Shared nav bar ───
const NavBar = ({w=1280}) => (
  <div className="wf" style={{display:'flex', alignItems:'center', justifyContent:'space-between', padding:'12px 24px', borderBottom:'2px solid #2a2a2a', background:'#fff'}}>
    <div style={{display:'flex', alignItems:'center', gap:12}}>
      <div style={{width:28,height:28,background:'#1B3A6B',borderRadius:4}}></div>
      <span style={{fontSize:20,fontWeight:600}}>The Superhero</span>
    </div>
    <div style={{display:'flex', gap:24, fontSize:17}}>
      <span style={{fontWeight:600, borderBottom:'2px solid #F4A535', paddingBottom:2}}>Dashboard</span>
      <span>Browse projects</span>
      <span style={{color:'#888'}}>Blueprints</span>
      <span style={{color:'#888'}}>Profile</span>
    </div>
    <div className="wf-avatar" style={{width:32,height:32}}></div>
  </div>
);

// ─── Small project card ───
const MiniProjectCard = ({title="Urban Rewilding — Hackney", type="Community", progress=65, steps=3, role="Contributor"}) => (
  <div className="wf-box wf" style={{padding:16, display:'flex', flexDirection:'column', gap:8}}>
    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
      <span style={{fontSize:18, fontWeight:600}}>{title}</span>
      <span className="wf-tag" style={{fontSize:13}}>{role}</span>
    </div>
    <div style={{display:'flex', gap:8, alignItems:'center', fontSize:15, color:'#666'}}>
      <span className="wf-tag">{type}</span>
      <span>{steps} steps assigned to you</span>
    </div>
    <div className="wf-progress"><div className="wf-progress-fill" style={{width:`${progress}%`}}></div></div>
    <div style={{fontSize:14, color:'#888'}}>{progress}% complete</div>
  </div>
);

// ─── Step row ───
const StepRow = ({title="Write grant application", project="Repair Café — Camden", skill="Grant writing", hrs=4, status="needs_help"}) => (
  <div className="wf" style={{display:'flex', alignItems:'center', gap:12, padding:'10px 14px', borderBottom:'1.5px solid #e8e4dc'}}>
    <div style={{width:18,height:18,borderRadius:4,border:'2px solid '+(status==='needs_help'?'#F4A535':'#1B3A6B'),background:status==='done'?'#1B3A6B':'transparent', flexShrink:0}}></div>
    <div style={{flex:1}}>
      <div style={{fontSize:17, fontWeight:600}}>{title}</div>
      <div style={{fontSize:14, color:'#888'}}>{project}</div>
    </div>
    <span className="wf-tag">{skill}</span>
    <span style={{fontSize:14, color:'#888', minWidth:50, textAlign:'right'}}>{hrs}h est.</span>
    {status === 'needs_help' && <span style={{fontSize:13, padding:'2px 8px', background:'#FEF3E0', border:'1.5px solid #F4A535', borderRadius:999, color:'#B87A1A'}}>needs help</span>}
  </div>
);

// ─── Stat box ───
const Stat = ({label, value, sub}) => (
  <div className="wf-box wf" style={{padding:16, textAlign:'center', flex:1}}>
    <div style={{fontSize:28, fontWeight:600}}>{value}</div>
    <div style={{fontSize:16, color:'#666'}}>{label}</div>
    {sub && <div style={{fontSize:13, color:'#999'}}>{sub}</div>}
  </div>
);

// ─── Suggested project card ───
const SuggestedCard = ({title="Community Solar Group — Bristol", match="87%", skills=["Finance","Community organising"]}) => (
  <div className="wf-box-dashed wf" style={{padding:14, display:'flex', flexDirection:'column', gap:8}}>
    <div style={{display:'flex', justifyContent:'space-between'}}>
      <span style={{fontSize:17, fontWeight:600}}>{title}</span>
      <span className="wf-note">{match} match</span>
    </div>
    <div style={{display:'flex', gap:6}}>
      {skills.map((s,i) => <span key={i} className="wf-tag" style={{fontSize:13}}>{s}</span>)}
    </div>
    <div style={{fontSize:14, color:'#888'}}>3 steps need help · 6h total</div>
  </div>
);

// ════════════════════════════════════════════
// VARIATION A — Classic sidebar + main
// Left: nav sidebar with sections
// Right: overview stats → my projects → my steps
// ════════════════════════════════════════════
const VariationA = () => (
  <div style={{width:1280, background:'#faf8f5'}}>
    <NavBar />
    <div style={{display:'flex', minHeight:720}}>
      {/* Sidebar */}
      <div className="wf" style={{width:240, borderRight:'2px solid #e8e4dc', padding:'20px 16px', display:'flex', flexDirection:'column', gap:4, background:'#fff'}}>
        <div className="wf-label" style={{marginBottom:4}}>Overview</div>
        <div style={{padding:'8px 12px', background:'#F4A535', borderRadius:6, fontWeight:600, fontSize:16}}>My dashboard</div>

        <div className="wf-label" style={{marginBottom:4}}>Discover</div>
        <div style={{padding:'8px 12px', fontSize:16}}>Browse projects</div>
        <div style={{padding:'8px 12px', fontSize:16}}>Skill matches</div>
      </div>
      {/* Main */}
      <div style={{flex:1, padding:28, display:'flex', flexDirection:'column', gap:24}}>
        <div className="wf" style={{fontSize:26, fontWeight:600}}>Welcome back, Alex</div>
        {/* Stats row */}
        <div style={{display:'flex', gap:16}}>
          <Stat label="Active projects" value="3" />
          <Stat label="Steps assigned" value="7" sub="2 due this week" />
          <Stat label="Hours contributed" value="42" />
          <Stat label="Skills matched" value="5" />
        </div>
        {/* Projects */}
        <div>
          <div className="wf" style={{fontSize:20, fontWeight:600, marginBottom:12}}>My projects</div>
          <div style={{display:'flex', flexDirection:'column', gap:10}}>
            <MiniProjectCard />
            <MiniProjectCard title="Repair Café — Camden" type="Circular Economy" progress={30} steps={2} role="Lead" />
          </div>
        </div>
        {/* Steps */}
        <div>
          <div className="wf" style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
            <span style={{fontSize:20, fontWeight:600}}>My upcoming steps</span>
            <span style={{fontSize:14, color:'#888'}}>View all →</span>
          </div>
          <div className="wf-box" style={{overflow:'hidden'}}>
            <StepRow />
            <StepRow title="Design event poster" project="Urban Rewilding — Hackney" skill="Graphic design" hrs={2} status="in_progress" />
            <StepRow title="Contact local council" project="Repair Café — Camden" skill="Community organising" hrs={1} status="not_started" />
          </div>
        </div>
      </div>
    </div>
  </div>
);

// ════════════════════════════════════════════
// VARIATION B — Three-column: Projects | Steps | Suggestions
// No sidebar. Horizontal top nav. Three equal columns.
// ════════════════════════════════════════════
const VariationB = () => (
  <div style={{width:1280, background:'#faf8f5'}}>
    <NavBar />
    <div className="wf" style={{padding:28}}>
      <div style={{fontSize:26, fontWeight:600, marginBottom:20}}>Your dashboard</div>
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:20, alignItems:'start'}}>
        {/* Col 1: My Projects */}
        <div>
          <div style={{fontSize:18, fontWeight:600, marginBottom:10, display:'flex', justifyContent:'space-between'}}>
            <span>My projects (3)</span>
          </div>
          <div style={{display:'flex', flexDirection:'column', gap:10}}>
            <MiniProjectCard />
            <MiniProjectCard title="Repair Café — Camden" type="Circular Economy" progress={30} steps={2} role="Lead" />
            <MiniProjectCard title="Solar Co-op — Bristol" type="Energy" progress={85} steps={1} role="Advisor" />
          </div>
        </div>
        {/* Col 2: My Steps */}
        <div>
          <div style={{fontSize:18, fontWeight:600, marginBottom:10}}>My steps (7)</div>
          <div className="wf-box" style={{overflow:'hidden'}}>
            <StepRow />
            <StepRow title="Design event poster" project="Urban Rewilding — Hackney" skill="Graphic design" hrs={2} status="in_progress" />
            <StepRow title="Contact local council" project="Repair Café — Camden" skill="Community organising" hrs={1} status="not_started" />

          </div>
        </div>
        {/* Col 3: Suggestions */}

          <div style={{fontSize:18, fontWeight:600, marginBottom:10}}>Suggested for you</div>
          <div style={{display:'flex', flexDirection:'column', gap:10}}>
            <SuggestedCard />
            <SuggestedCard title="Policy Toolkit — Manchester" match="74%" skills={["Research","Writing"]} />
            <SuggestedCard title="Tree Planting — Tower Hamlets" match="68%" skills={["Community organising"]} />
          </div>
          <div className="wf-note" style={{marginTop:10, fontSize:14}}>↑ Based on your skills and availability</div>
        </div>
      </div>
    </div>
  </div>

// ════════════════════════════════════════════
// VARIATION C — Task-centric / Kanban-style

// ════════════════════════════════════════════
const KanbanCard = ({title, project, skill, hrs, highlight}) => (

    <div style={{fontSize:16, fontWeight:600}}>{title}</div>
    <div style={{fontSize:13, color:'#888'}}>{project}</div>
    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
      <span className="wf-tag" style={{fontSize:12}}>{skill}</span>
      <span style={{fontSize:13, color:'#888'}}>{hrs}h</span>
    </div>
  </div>
);

          </div>

            <KanbanCard title="Design event poster" project="Urban Rewilding — Hackney" skill="Graphic design" hrs={2} />
            <KanbanCard title="Coordinate volunteers" project="Repair Café" skill="Management" hrs={3} />
          </div>

        {/* Done */}
        <div>
          <div style={{fontSize:15, fontWeight:600, marginBottom:10, color:'#3DAF7C'}}>
            Done (5)
          </div>
          <div style={{display:'flex', flexDirection:'column', gap:8, opacity:0.5}}>

          </div>
        </div>
      </div>

// ════════════════════════════════════════════
