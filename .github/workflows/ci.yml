name: CI

# Quality gates on every push and pull request: types, lint, tests, build.
# The build uses placeholder env values — no page touches the database at
# build time (all data-fetching routes are request-time dynamic), the env
# values just need to exist for module-load validation.

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint . --max-warnings 0

      - name: Translation freshness
        run: npm run translate:check

      - name: Test
        run: npm test --if-present

      - name: Build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          CLERK_SECRET_KEY: sk_test_ci_placeholder
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2ktcGxhY2Vob2xkZXIuY2xlcmsuYWNjb3VudHMuZGV2JA
          NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ci-placeholder
        run: npm run build
